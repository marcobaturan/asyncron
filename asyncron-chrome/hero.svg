<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a1a" rx="10"/>
  
  <!-- Text Header -->
  <text x="200" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="2">ASYNCRON</text>
  
  <!-- TV Monitor -->
  <!-- Antennas -->
  <line x1="200" y1="80" x2="150" y2="50" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <circle cx="150" cy="50" r="5" fill="#888"/>
  <line x1="200" y1="80" x2="250" y2="50" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <circle cx="250" cy="50" r="5" fill="#888"/>
  
  <!-- TV Body -->
  <rect x="100" y="80" width="200" height="130" rx="12" fill="#2a2a2a" stroke="#111" stroke-width="4"/>
  <!-- Screen -->
  <rect x="112" y="92" width="176" height="106" rx="6" fill="#111" stroke="#000" stroke-width="2"/>
  
  <!-- Play Button -->
  <polygon points="185,120 185,160 220,140" fill="#4A9EFF" filter="drop-shadow(0px 0px 8px #4A9EFF)"/>
  
  <!-- Stand -->
  <path d="M185 210 L175 230 L225 230 L215 210 Z" fill="#333" stroke="#111" stroke-width="3"/>
  <path d="M165 230 L235 230" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Botonera -->
  <rect x="90" y="240" width="220" height="40" rx="10" fill="#222" stroke="#111" stroke-width="2"/>
  
  <!-- Subicons -->
  <!-- Document -->
  <g transform="translate(100, 248) scale(1.6)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#111" stroke="#444" stroke-width="0.5"/>
    <path d="M3 2v10c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V5L8 2H4c-.6 0-1 .4-1 1z" fill="#f0f0f0" stroke="#888" stroke-width="0.8"/>
    <path d="M8 2v3h3" fill="#d0d0d0" stroke="#888" stroke-width="0.8"/>
    <line x1="5" y1="7" x2="9" y2="7" stroke="#bbb" stroke-width="0.8"/>
    <line x1="5" y1="10" x2="10" y2="10" stroke="#bbb" stroke-width="0.8"/>
  </g>
  
  <!-- Code -->
  <g transform="translate(138, 248) scale(1.6)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#111" stroke="#444" stroke-width="0.5"/>
    <rect x="2" y="3" width="12" height="10" rx="1" fill="#212121" stroke="#000" stroke-width="0.8"/>
    <rect x="2" y="3" width="12" height="3" fill="#424242"/>
    <circle cx="4" cy="4.5" r="0.8" fill="#ef5350"/>
    <circle cx="6" cy="4.5" r="0.8" fill="#ffca28"/>
    <circle cx="8" cy="4.5" r="0.8" fill="#66bb6a"/>
    <path d="M4 8 L6 10 L4 12" fill="none" stroke="#4fc3f7" stroke-width="0.8"/>
  </g>

  <!-- Image -->
  <g transform="translate(176, 248) scale(1.6)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#111" stroke="#444" stroke-width="0.5"/>
    <rect x="2" y="3" width="12" height="10" rx="1" fill="#fff" stroke="#888" stroke-width="0.8"/>
