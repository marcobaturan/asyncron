<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a1a" rx="10"/>
  
  <!-- Step 1: Record -->
  <g transform="translate(40, 40)">
    <circle cx="40" cy="40" r="35" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <circle cx="40" cy="40" r="15" fill="#ff4a4a"/>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">1. RECORD</text>
  </g>
  
  <!-- Arrow -->
  <path d="M130 80 L170 80" stroke="#4A9EFF" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Attach -->
  <g transform="translate(190, 40)">
    <rect x="5" y="5" width="70" height="70" rx="10" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <path d="M30 40 L50 40 M40 30 L40 50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">2. ATTACH</text>
    <!-- Mini icons around -->
    <rect x="10" y="10" width="15" height="15" rx="2" fill="#4fc3f7" opacity="0.6"/>
    <rect x="55" y="55" width="15" height="15" rx="2" fill="#81c784" opacity="0.6"/>
  </g>
  
  <!-- Arrow -->
  <path d="M280 80 L320 80" stroke="#4A9EFF" stroke-width="3"/>
  
  <!-- Step 3: Bundle -->
  <g transform="translate(340, 40)">
    <rect x="5" y="5" width="70" height="70" rx="10" fill="#2a2a2a" stroke="#4A9EFF" stroke-width="2"/>
    <text x="40" y="45" font-family="sans-serif" font-size="10" font-weight="bold" fill="#4A9EFF" text-anchor="middle">.ASYNC</text>
    <path d="M20 55 L60 55" stroke="#4A9EFF" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">3. BUNDLE</text>
  </g>
  
  <!-- Arrow -->
  <path d="M430 80 L470 80" stroke="#4A9EFF" stroke-width="3"/>
  
  <!-- Step 4: Share -->
  <g transform="translate(490, 40)">
    <circle cx="40" cy="40" r="35" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <path d="M25 40 L55 40 M55 40 L45 30 M55 40 L45 50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">4. SHARE</text>
  </g>
  
  <!-- Arrow -->
  <path d="M580 80 L620 80" stroke="#4A9EFF" stroke-width="3"/>
  
  <!-- Step 5: View -->
  <g transform="translate(640, 40)">
    <rect x="5" y="10" width="70" height="55" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <rect x="15" y="18" width="50" height="30" rx="2" fill="#111"/>
    <polygon points="35,25 35,41 50,33" fill="#4A9EFF"/>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">5. VIEW</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A9EFF" />
    </marker>
  </defs>
</svg>
